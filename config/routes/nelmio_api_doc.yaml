# Expose your documentation as JSON swagger compliant
app.swagger:
    path: /api/doc.json
    methods: GET
    defaults: { _controller: nelmio_api_doc.controller.swagger }
nelmio_api_doc:
  path: /api/doc
  controller: Nelmio\ApiDocBundle\Controller\SwaggerUiController
  methods: [GET]

